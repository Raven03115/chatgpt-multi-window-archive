<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'"
  >
  <title>Shaped Sidebar PoC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111111;
      color: #eeeeee;
      font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 260px 1fr 1fr;
      gap: 2px;
    }

    .reserved {
      padding: 24px;
      background: #171717;
      color: #888888;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 32px;
      background: #202020;
      border: 1px solid #353535;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: #bdbdbd;
    }

    button {
      width: fit-content;
      padding: 10px 18px;
      border: 1px solid #666666;
      border-radius: 8px;
      background: #303030;
      color: #ffffff;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #3b3b3b;
    }

    .result {
      min-height: 44px;
      padding: 12px;
      border: 1px solid #444444;
      border-radius: 8px;
      background: #161616;
    }

    .instructions {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid #3a3a3a;
      font-size: 14px;
      color: #aaaaaa;
    }
  </style>
</head>

<body>
  <section class="reserved">
    這個區域會被官方 ChatGPT 左側欄覆蓋。
  </section>

  <section class="panel">
    <h1>底層測試區 A</h1>

    <p>
      左側覆蓋視窗收合時，這個區域應保持可見且可以點擊。
    </p>

    <button id="button-a">測試右側點擊 A</button>

    <div id="result-a" class="result">
      尚未點擊。
    </div>

    <div class="instructions">
      Ctrl + Alt + O：擴大側欄形狀<br>
      Ctrl + Alt + P：縮回側欄形狀<br>
      Ctrl + Alt + Q：關閉 PoC
    </div>
  </section>

  <section class="panel">
    <h1>底層測試區 B</h1>

    <p>
      這個區域用來確認覆蓋視窗沒有把整個工作區遮住。
    </p>

    <button id="button-b">測試右側點擊 B</button>

    <div id="result-b" class="result">
      尚未點擊。
    </div>
  </section>

  <script>
    let countA = 0;
    let countB = 0;

    document.getElementById("button-a").addEventListener("click", () => {
      countA += 1;
      document.getElementById("result-a").textContent =
        "A 已成功點擊 " + countA + " 次";
    });

    document.getElementById("button-b").addEventListener("click", () => {
      countB += 1;
      document.getElementById("result-b").textContent =
        "B 已成功點擊 " + countB + " 次";
    });
  </script>
</body>
</html>
