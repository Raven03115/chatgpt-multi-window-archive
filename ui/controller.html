<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />
  <title>
    ChatGPT Floating Workspace
  </title>
  <link
    rel="stylesheet"
    href="./controller.css"
  />
</head>
<body>
  <main class="controller">
    <section class="top-row">
      <div>
        <div class="title">
          ChatGPT Floating Workspace
        </div>

        <div class="subtitle">
          v5.0-B｜獨立保存並排與浮動布局
        </div>
      </div>

      <div
        id="statusText"
        class="status"
      >
        正在讀取狀態…
      </div>
    </section>

    <section class="control-row">
      <div class="control-group">
        <span class="label">
          視窗數量
        </span>

        <div
          id="paneCountButtons"
          class="button-strip"
        ></div>
      </div>

      <div class="control-group">
        <span class="label">
          模式
        </span>

        <div class="button-strip">
          <button
            type="button"
            data-mode="tiled"
          >
            無重疊並排
          </button>

          <button
            type="button"
            data-mode="floating"
          >
            自由浮動
          </button>
        </div>
      </div>

      <div class="control-group action-strip">
        <button
          type="button"
          id="arrangeButton"
        >
          套用並排
        </button>

        <button
          type="button"
          id="lockButton"
        >
          鎖定浮動位置
        </button>

        <button
          type="button"
          id="showAllButton"
        >
          顯示全部
        </button>

        <button
          type="button"
          id="hideAllButton"
        >
          隱藏全部
        </button>
      </div>
    </section>

    <section
      id="ratioSection"
      class="ratio-section"
    >
      <div class="ratio-header">
        <span class="label">
          並排比例
        </span>

        <button
          type="button"
          id="resetRatioButton"
          class="compact-button"
        >
          重設平均
        </button>

        <span
          id="ratioHint"
          class="ratio-hint"
        ></span>
      </div>

      <div
        id="ratioControls"
        class="ratio-controls"
      ></div>
    </section>

    <section
      id="paneButtons"
      class="pane-row"
    ></section>
  </main>

  <script src="./controller.js"></script>
</body>
</html>
