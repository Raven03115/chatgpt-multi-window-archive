<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>ChatGPT Multi Workspace</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <aside class="sidebar">
    <header class="app-header">
      <div class="app-title">ChatGPT Workspace</div>
      <div class="app-subtitle">官方 ChatGPT 多窗格</div>
    </header>

    <section class="section">
      <div class="section-title">窗格數量</div>
      <div class="layout-grid">
        <button data-layout="1">1</button>
        <button data-layout="2">2</button>
        <button data-layout="3">3</button>
        <button data-layout="4">4</button>
        <button data-layout="6">6</button>
      </div>
    </section>

    <section class="section">
      <div class="section-title">目前窗格</div>
      <div id="paneList" class="pane-list"></div>
    </section>

    <section class="section">
      <div class="section-title">操作</div>
      <div class="action-list">
        <button id="newChatButton">目前窗格開新對話</button>
        <button id="reloadActiveButton">刷新目前窗格</button>
        <button id="reloadAllButton">刷新全部窗格</button>
        <button id="saveChatButton">保存目前對話網址</button>
      </div>
    </section>

    <section class="section saved-section">
      <div class="section-title">已保存對話</div>
      <div id="savedChatList" class="saved-list empty">
        尚未保存對話
      </div>
    </section>

    <footer class="footer">
      <div>快捷鍵：Ctrl + Alt + 1/2/3/4/6</div>
      <div>不使用 API，不讀取官方歷史清單</div>
    </footer>
  </aside>

  <main class="workspace-placeholder">
    <div class="placeholder-text">
      ChatGPT panes render here
    </div>
  </main>

  <script src="./renderer.js"></script>
</body>
</html>
